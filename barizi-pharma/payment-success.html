<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful — Barizi Pharma</title>
  <link rel="stylesheet" href="academy.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--off-white); }
    .success-box { background: var(--white); border-radius: var(--radius); padding: 56px 48px; max-width: 520px; width: 100%; text-align: center; box-shadow: var(--shadow-card); }
    .success-icon { font-size: 4rem; margin-bottom: 20px; }
    .success-box h1 { font-family: var(--font-head); font-size: 1.8rem; font-weight: 800; color: var(--text-dark); margin-bottom: 12px; }
    .success-box p { color: var(--text-mid); font-size: 0.97rem; line-height: 1.7; margin-bottom: 8px; }
    .ref-box { background: var(--blue-light); border-radius: var(--radius-sm); padding: 14px 20px; margin: 24px 0; font-size: 0.85rem; color: var(--blue-dark); font-weight: 600; }
    .ref-label { font-size: 0.75rem; color: var(--text-light); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.08em; }
    .status-badge { display: inline-block; background: var(--green-light); color: var(--green-dark); border-radius: 50px; padding: 5px 16px; font-size: 0.8rem; font-weight: 700; margin-bottom: 24px; }
    .loading { color: var(--text-light); font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="success-box">
    <div class="success-icon" id="icon">⏳</div>
    <h1 id="title">Verifying Payment...</h1>
    <p id="subtitle" class="loading">Please wait while we confirm your transaction.</p>
    <div class="ref-box" id="refBox" style="display:none">
      <span class="ref-label">Transaction Reference</span>
      <span id="refNum">—</span>
    </div>
    <div id="extraInfo"></div>
    <a href="academy.html" class="btn-primary" style="display:inline-block; margin-top:24px; padding:12px 32px; border-radius:50px; text-decoration:none;">← Back to Barizi Pharma</a>
  </div>

  <script>
    var SERVER = 'http://localhost:3000';

    // Paystack appends ?reference=xxx or ?trxref=xxx to the callback URL
    var params    = new URLSearchParams(window.location.search);
    var reference = params.get('reference') || params.get('trxref');

    var icon     = document.getElementById('icon');
    var title    = document.getElementById('title');
    var subtitle = document.getElementById('subtitle');
    var refBox   = document.getElementById('refBox');
    var refNum   = document.getElementById('refNum');
    var extra    = document.getElementById('extraInfo');

    if (!reference) {
      icon.textContent    = '❌';
      title.textContent   = 'No Reference Found';
      subtitle.textContent = 'We could not find a transaction reference. Please contact support.';
    } else {
      refNum.textContent = reference;
      refBox.style.display = 'block';

      fetch(SERVER + '/api/payment/verify/' + reference)
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.success && data.status === 'success') {
            icon.textContent    = '✅';
            title.textContent   = 'Payment Successful!';
            subtitle.textContent = 'Thank you for enrolling. You will receive course access details via email shortly.';
            subtitle.className  = '';
            extra.innerHTML     =
              '<span class="status-badge">✓ Confirmed</span>' +
              (data.course ? '<p><strong>Course:</strong> ' + data.course + '</p>' : '') +
              (data.amount ? '<p><strong>Amount Paid:</strong> KES ' + data.amount + '</p>' : '') +
              (data.email  ? '<p><strong>Email:</strong> ' + data.email + '</p>' : '');
          } else {
            icon.textContent    = '⚠️';
            title.textContent   = 'Payment Pending or Failed';
            subtitle.textContent = 'Status: ' + (data.status || 'unknown') + '. If you were charged, contact support with your reference.';
          }
        })
        .catch(function () {
          icon.textContent    = '⚠️';
          title.textContent   = 'Verification Error';
          subtitle.textContent = 'Could not reach the server. Save your reference and contact support.';
        });
    }
  </script>
</body>
</html>
